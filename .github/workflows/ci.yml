name: CI

# Regressions-Gate: läuft bei jedem Push und PR. Typecheck, Tests UND Lint
# blockieren — alle 161 Alt-Lint-Fehler aus dem Next.js-16-Upgrade sind behoben,
# daher ist Lint jetzt ein hartes Gate gegen neue Fehler.
#
# Bewusste Entscheidungen:
# - `next build` ist NICHT Teil des Gates: der Prerender von /_not-found braucht
#   eine echte DB (P1001 ohne erreichbaren Postgres). Build wird beim Deploy auf
#   dem Server (mit DB) bzw. lokal verifiziert, nicht hier.
# - Bei `npm run lint` bewusst KEIN `--max-warnings 0`: verbleibende Warnungen
#   (z. B. no-img-element, exhaustive-deps) sollen das Gate nicht rot machen;
#   ESLint liefert bei reinen Warnungen Exit 0.
on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Platzhalter — wird nur für `prisma generate`/Typecheck benötigt, es wird
      # keine echte Datenbankverbindung aufgebaut. Tests sind rein (pure
      # Funktionen + DB-freie RTL-Smoke-Tests) und brauchen keine DB.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Lint
        run: npm run lint
