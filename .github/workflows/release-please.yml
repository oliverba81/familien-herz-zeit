name: release-please

# Erstellt automatisch einen "Release-PR" (Version-Bump in package.json + CHANGELOG)
# aus den Conventional-Commits auf main. Merge des PR -> Git-Tag vX.Y.Z + GitHub-Release.
#
# Voraussetzung: In den Repo-Einstellungen unter
#   Settings -> Actions -> General -> Workflow permissions
# "Allow GitHub Actions to create and approve pull requests" aktivieren.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Deploy nur, wenn release-please ein neues Release erstellt hat.
  deploy:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
